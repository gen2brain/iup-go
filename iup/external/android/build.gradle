buildscript {
	repositories {
		google()
		mavenCentral()
	}
	dependencies {
		classpath 'com.android.tools.build:gradle:9.1.1'
	}
}

allprojects {
	repositories {
		google()
		mavenCentral()
	}
}

tasks.register('clean', Delete) {
	delete rootProject.layout.buildDirectory
}

ext {
	compileSdk = 36
	minSdk = 22
	targetSdk = 36
	ndkVersion = '30.0.14904198'
	versionCode = 1
	versionName = "1.0"
	abiFilters = fetchAbiFilters()
	appCompat = 'androidx.appcompat:appcompat:1.7.0'
	material = 'com.google.android.material:material:1.12.0'
	recyclerView = 'androidx.recyclerview:recyclerview:1.3.2'
}


/* Reads `abiFilters=<space-separated list>` from local.properties; defaults to all four ABIs. */
String[] fetchAbiFilters()
{
	def defaultAbi = ['armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64']
	def localProperties = new File(project.rootDir, "local.properties")
	if (!localProperties.exists())
	{
		return defaultAbi
	}

	Properties properties = new Properties()
	localProperties.withInputStream { instr -> properties.load(instr) }
	def value = properties.getProperty('abiFilters')
	if (value)
	{
		return value.split()
	}
	return defaultAbi
}
